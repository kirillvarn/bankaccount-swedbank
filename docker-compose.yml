version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file: ".env"
    depends_on:
      - db
    restart: always

  db:
    image: postgres:18
    restart: always
    env_file: ".env"
    ports:
     - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

volumes:
  postgres_data: