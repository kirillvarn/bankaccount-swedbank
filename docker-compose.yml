version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file: ".env"
    depends_on:
      - db
    restart: always

  db:
    image: postgres:18
    restart: always
    env_file: ".env"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: